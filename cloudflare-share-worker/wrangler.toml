name = "scorecard-share"
main = "src/worker.tsx"
compatibility_date = "2025-12-01"
compatibility_flags = ["nodejs_compat"]

# Routes: bind to share.ivanmanfredi.com after DNS is set up
# (one-time: `wrangler deploy` then add the route in Cloudflare dashboard)
# Workers.dev subdomain enabled — Worker is reachable at scorecard-share.<account>.workers.dev
# To bind a custom subdomain like share.ivanmanfredi.com, add the domain to Cloudflare DNS
# (full zone) and uncomment the routes block below.
workers_dev = true

