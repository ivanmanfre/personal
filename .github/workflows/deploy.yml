name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  # Queue deploys instead of cancelling. The prerender build is slow (installs
  # Chromium), and automation pushes to main frequently — with cancel-in-progress
  # every new push killed the in-flight deploy, so builds rarely completed and
  # production stayed frozen on a stale bundle. Queueing lets the latest main land.
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx playwright install chromium --with-deps

      - run: npm run build:prerender
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_DASHBOARD_HASH: ${{ secrets.VITE_DASHBOARD_HASH }}
          VITE_CLAUDE_CODE_URL: ${{ secrets.VITE_CLAUDE_CODE_URL }}
          # client_boards is RLS deny-all; prerender enumerates finished preview boards
          # via the board-generator service (bearer BOARD_GEN_TOKEN) to bake per-board OG.
          BOARD_GEN_URL: ${{ secrets.BOARD_GEN_URL }}
          BOARD_GEN_TOKEN: ${{ secrets.BOARD_GEN_TOKEN }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
        with:
          # Pages status polling was timing out at the 10-min default (4 runs on
          # 2026-07-02, "Timeout reached, aborting!" with a green build) — give
          # GitHub's processing 30 min before declaring failure.
          timeout: 1800000

  # Scan mirror: scans are the product surface, served at inboundonsteroids.com/scan/
  # (real files in the inboundonsteroids-site repo — no redirects). Same source, second
  # build with base=/scan/, scan routes prerendered only, pushed cross-repo.
  scan-mirror:
    runs-on: ubuntu-latest
    concurrency:
      group: scan-mirror
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx playwright install chromium --with-deps

      - run: npm run build && SCAN_MIRROR=1 node scripts/prerender.mjs
        env:
          VITE_BASE: /scan/
          VITE_SCAN_ORIGIN: https://inboundonsteroids.com
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_DASHBOARD_HASH: ${{ secrets.VITE_DASHBOARD_HASH }}
          VITE_CLAUDE_CODE_URL: ${{ secrets.VITE_CLAUDE_CODE_URL }}

      - name: Push scan mirror to inboundonsteroids-site
        env:
          MIRROR_PUSH_TOKEN: ${{ secrets.MIRROR_PUSH_TOKEN }}
        run: |
          git clone --depth 1 "https://x-access-token:${MIRROR_PUSH_TOKEN}@github.com/ivanmanfre/inboundonsteroids-site.git" /tmp/product-site
          rsync -a --delete --exclude CNAME dist/ /tmp/product-site/scan/
          # Scan reports reference /content-system/*.webp and /ivan-portrait-400.webp by
          # root-absolute path; mirror them to the product-site root so they resolve on
          # inboundonsteroids.com (they 404 when only /scan/ is synced).
          rsync -a --include='*.webp' --exclude='*' dist/content-system/ /tmp/product-site/content-system/
          cp dist/ivan-portrait-400.webp /tmp/product-site/ivan-portrait-400.webp
          cd /tmp/product-site
          git add scan/ content-system/ ivan-portrait-400.webp
          if git diff --cached --quiet; then echo "scan mirror unchanged"; exit 0; fi
          git -c user.name="scan-mirror-bot" -c user.email="noreply@ivanmanfredi.com" commit -m "scan mirror: sync from personal-site $GITHUB_SHA"
          # scan-mirror and client-mirror both push to this repo (disjoint dirs);
          # rebase-and-retry so the second pusher doesn't fail non-fast-forward.
          for i in 1 2 3 4 5; do
            git push origin main && exit 0
            git pull --rebase origin main
          done
          git push origin main

  # Client mirror: token-gated demo boards are a product surface too, served at
  # inboundonsteroids.com/client/ (real files in the inboundonsteroids-site repo —
  # no redirects). Same source, second build with base=/client/, client routes
  # prerendered only, pushed cross-repo. Parallels scan-mirror exactly; additive.
  client-mirror:
    runs-on: ubuntu-latest
    concurrency:
      group: client-mirror
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx playwright install chromium --with-deps

      - run: npm run build && CLIENT_MIRROR=1 node scripts/prerender.mjs
        env:
          VITE_BASE: /client/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_DASHBOARD_HASH: ${{ secrets.VITE_DASHBOARD_HASH }}
          VITE_CLAUDE_CODE_URL: ${{ secrets.VITE_CLAUDE_CODE_URL }}
          # client_boards is RLS deny-all; prerender enumerates finished preview boards
          # via the board-generator service (bearer BOARD_GEN_TOKEN) to bake per-board OG.
          BOARD_GEN_URL: ${{ secrets.BOARD_GEN_URL }}
          BOARD_GEN_TOKEN: ${{ secrets.BOARD_GEN_TOKEN }}

      - name: Push client mirror to inboundonsteroids-site
        env:
          MIRROR_PUSH_TOKEN: ${{ secrets.MIRROR_PUSH_TOKEN }}
        run: |
          git clone --depth 1 "https://x-access-token:${MIRROR_PUSH_TOKEN}@github.com/ivanmanfre/inboundonsteroids-site.git" /tmp/product-site-client
          rsync -a --delete --exclude CNAME dist/ /tmp/product-site-client/client/
          cd /tmp/product-site-client
          git add client/
          if git diff --cached --quiet; then echo "client mirror unchanged"; exit 0; fi
          git -c user.name="client-mirror-bot" -c user.email="noreply@ivanmanfredi.com" commit -m "client mirror: sync from personal-site $GITHUB_SHA"
          # see scan-mirror note: rebase-and-retry against the sibling mirror job
          for i in 1 2 3 4 5; do
            git push origin main && exit 0
            git pull --rebase origin main
          done
          git push origin main
