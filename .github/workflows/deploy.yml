name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx playwright install chromium --with-deps

      # Diagnostic — minimal bash, no set -e, no fancy var indirection.
      - name: Diagnose env presence
        shell: bash
        run: |
          echo "--- node $(node --version), npm $(npm --version) ---"
          for v in VITE_SUPABASE_URL VITE_SUPABASE_ANON_KEY VITE_DASHBOARD_HASH VITE_CLAUDE_CODE_URL; do
            eval "val=\$$v"
            if [ -n "$val" ]; then echo "$v: PRESENT (${#val} chars)"; else echo "$v: MISSING"; fi
          done
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_DASHBOARD_HASH: ${{ secrets.VITE_DASHBOARD_HASH }}
          VITE_CLAUDE_CODE_URL: ${{ secrets.VITE_CLAUDE_CODE_URL }}

      - name: Vite build
        id: vite_build
        continue-on-error: true
        run: npm run build 2>&1 | tee build.log
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_DASHBOARD_HASH: ${{ secrets.VITE_DASHBOARD_HASH }}
          VITE_CLAUDE_CODE_URL: ${{ secrets.VITE_CLAUDE_CODE_URL }}

      # Upload the full build log as a workflow artifact so I can pull it
      # via the public API even without admin log access.
      - name: Upload build log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      # If the build failed, fail the workflow here (after the log is uploaded).
      - name: Fail if build failed
        if: steps.vite_build.outcome != 'success'
        run: |
          echo "::error::Vite build failed — see build-log artifact"
          exit 1

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
