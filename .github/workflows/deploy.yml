name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  # Queue deploys instead of cancelling. The prerender build is slow (installs
  # Chromium), and automation pushes to main frequently — with cancel-in-progress
  # every new push killed the in-flight deploy, so builds rarely completed and
  # production stayed frozen on a stale bundle. Queueing lets the latest main land.
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx playwright install chromium --with-deps

      - run: npm run build:prerender
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_DASHBOARD_HASH: ${{ secrets.VITE_DASHBOARD_HASH }}
          VITE_CLAUDE_CODE_URL: ${{ secrets.VITE_CLAUDE_CODE_URL }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
        with:
          # Pages status polling was timing out at the 10-min default (4 runs on
          # 2026-07-02, "Timeout reached, aborting!" with a green build) — give
          # GitHub's processing 30 min before declaring failure.
          timeout: 1800000
